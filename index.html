<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#14171F" />
<title>Kios Dashboard</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #14171F; }
  body {
    font-family: 'IBM Plex Sans', ui-sans-serif, system-ui;
    color: #EDEAE2;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .tabular { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px; border-right: 1px solid #232736; padding: 28px 18px;
    display: flex; flex-direction: column; gap: 32px; flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; padding-left: 6px; }
  .logo-badge {
    width: 28px; height: 28px; border-radius: 6px; background: #D4A72C;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; color: #14171F; font-size: 15px;
  }
  .logo-text { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.2px; }
  .logo-text span { color: #D4A72C; }
  nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 11px; padding: 9px 12px; border-radius: 8px;
    border: none; background: transparent; color: #8B90A3; font-size: 13.5px; font-weight: 500;
    text-align: left; cursor: pointer; width: 100%; font-family: inherit;
  }
  .nav-item.active { background: #1C2030; color: #EDEAE2; }
  .attn-card {
    margin-top: auto; padding: 14px 12px; border-radius: 10px; background: #1C2030; border: 1px solid #262B3D;
  }
  .attn-label { font-size: 11px; color: #8B90A3; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
  .attn-num { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: #D4A72C; }
  .attn-sub { font-size: 12px; color: #8B90A3; }
  main { flex: 1; padding: 28px 36px; max-width: 1100px; min-width: 0; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 14px; }
  h1 { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; margin: 0; }
  .sub { color: #8B90A3; font-size: 13.5px; margin: 4px 0 0; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }
  .search-box { display: flex; align-items: center; gap: 8px; background: #1C2030; border: 1px solid #262B3D; border-radius: 8px; padding: 8px 12px; width: 180px; }
  .search-box span { font-size: 13px; color: #8B90A3; }
  .icon-btn { width: 34px; height: 34px; border-radius: 8px; background: #1C2030; border: 1px solid #262B3D; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #8B90A3; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: #D4A72C; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; color: #14171F; flex-shrink: 0; }

  .kpi-strip {
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: #1A1E2A; border: 1px solid #232736; border-radius: 12px; margin-bottom: 24px; overflow: hidden;
    background-image: radial-gradient(circle, #2A2E3D 1.2px, transparent 1.2px); background-size: 8px 8px;
  }
  .kpi { padding: 18px 22px; border-right: 1px dashed #2E3346; }
  .kpi:last-child { border-right: none; }
  .kpi-label { font-size: 11px; color: #8B90A3; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .kpi-value { font-size: 24px; font-weight: 500; margin-bottom: 6px; }
  .kpi-delta { display: flex; align-items: center; gap: 4px; font-size: 12px; }
  .kpi-delta.up { color: #4CAF7D; }
  .kpi-delta.down { color: #E0654F; }
  .kpi-delta span { color: #8B90A3; }

  .mid-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 20px; margin-bottom: 24px; }
  .card { background: #1A1E2A; border: 1px solid #232736; border-radius: 12px; padding: 20px 22px; }
  .card-title { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .range-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: 1px solid #262B3D; border-radius: 7px; padding: 6px 10px; color: #8B90A3; font-size: 12.5px; cursor: pointer; font-family: inherit; position: relative; }
  .range-menu { position: absolute; right: 0; top: 38px; background: #1C2030; border: 1px solid #262B3D; border-radius: 8px; overflow: hidden; z-index: 10; width: 150px; display: none; }
  .range-menu.open { display: block; }
  .range-menu div { padding: 8px 12px; font-size: 12.5px; cursor: pointer; }
  .range-menu div:hover { background: #232736; }

  .attn-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #1C2030; border-radius: 8px; margin-bottom: 10px; }
  .attn-row:last-child { margin-bottom: 0; }
  .attn-name { font-size: 13px; font-weight: 500; }
  .attn-meta { font-size: 11.5px; color: #8B90A3; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 22px; font-weight: 500; font-size: 11px; color: #8B90A3; text-transform: uppercase; letter-spacing: 0.5px; }
  th:first-child, td:first-child { padding-left: 22px; }
  td { padding: 13px 0; font-size: 13.5px; border-top: 1px solid #232736; }
  tr.row-hover:hover { background: #1C2030; }
  .status-pill { font-size: 11.5px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .table-wrap { overflow-x: auto; }

  @media (max-width: 720px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 14px 18px; gap: 16px; overflow-x: auto; }
    nav { flex-direction: row; }
    .attn-card { display: none; }
    main { padding: 20px 16px; }
    .mid-grid { grid-template-columns: 1fr; }
    .search-box { display: none; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-badge">K</div>
      <span class="logo-text">Kios<span>.</span></span>
    </div>
    <nav id="nav"></nav>
    <div class="attn-card">
      <div class="attn-label">Needs attention</div>
      <div class="attn-num" id="attn-count">0</div>
      <div class="attn-sub">orders pending fulfillment</div>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div>
        <h1>Good afternoon, Dinda</h1>
        <p class="sub">Here's how the store is doing today.</p>
      </div>
      <div class="topbar-actions">
        <div class="search-box"><span>🔍 Search orders, SKU…</span></div>
        <div class="icon-btn">🔔</div>
        <div class="avatar">D</div>
      </div>
    </div>

    <div class="kpi-strip" id="kpi-strip"></div>

    <div class="mid-grid">
      <div class="card">
        <div class="card-head">
          <div class="card-title">Revenue trend</div>
          <div class="range-btn" id="range-btn">
            <span id="range-label">Last 7 days</span> ▾
            <div class="range-menu" id="range-menu">
              <div data-range="Last 7 days">Last 7 days</div>
              <div data-range="Last 30 days">Last 30 days</div>
              <div data-range="This quarter">This quarter</div>
            </div>
          </div>
        </div>
        <svg id="chart" width="100%" height="200" viewBox="0 0 480 200" preserveAspectRatio="none"></svg>
      </div>

      <div class="card">
        <div class="card-head" style="margin-bottom:14px;">
          <div class="card-title">⚠️ Needs attention</div>
        </div>
        <div id="attn-list"></div>
      </div>
    </div>

    <div class="card" style="padding:0;">
      <div style="padding:18px 22px; border-bottom:1px solid #232736; display:flex; justify-content:space-between; align-items:center;">
        <div class="card-title">Recent orders</div>
        <div style="font-size:12.5px; color:#D4A72C; cursor:pointer;">View all →</div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Order</th><th>Customer</th><th>Items</th><th style="text-align:right;">Total</th>
              <th>Status</th><th>Time</th><th></th>
            </tr>
          </thead>
          <tbody id="orders-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script>
const revenueSeries = [
  { day: "Mon", value: 4210 }, { day: "Tue", value: 3840 }, { day: "Wed", value: 5120 },
  { day: "Thu", value: 4980 }, { day: "Fri", value: 6430 }, { day: "Sat", value: 7260 },
  { day: "Sun", value: 5910 },
];
const orders = [
  { id: "#8831", customer: "Marina Sutedjo", items: 3, total: 842000, status: "fulfilled", time: "2m ago" },
  { id: "#8830", customer: "Alex Chen", items: 1, total: 219000, status: "pending", time: "14m ago" },
  { id: "#8829", customer: "Rina Wulandari", items: 5, total: 1580000, status: "pending", time: "27m ago" },
  { id: "#8828", customer: "Budi Santoso", items: 2, total: 396000, status: "fulfilled", time: "41m ago" },
  { id: "#8827", customer: "Kevin Halim", items: 1, total: 129000, status: "cancelled", time: "1h ago" },
  { id: "#8826", customer: "Sarah Amelia", items: 4, total: 1042000, status: "fulfilled", time: "2h ago" },
];
const kpis = [
  { label: "Revenue today", value: "Rp 5.9jt", delta: "+12.4%", up: true },
  { label: "Orders today", value: "38", delta: "+6.1%", up: true },
  { label: "Avg. order value", value: "Rp 155k", delta: "-2.3%", up: false },
  { label: "Conversion rate", value: "3.2%", delta: "+0.4pt", up: true },
];
const statusStyle = {
  fulfilled: { bg: "#1C3A2E", text: "#4CAF7D", label: "Fulfilled" },
  pending: { bg: "#3A3120", text: "#D4A72C", label: "Pending" },
  cancelled: { bg: "#3A231F", text: "#E0654F", label: "Cancelled" },
};
const navItems = [
  { icon: "▦", label: "Overview", active: true },
  { icon: "🛍", label: "Orders" },
  { icon: "📦", label: "Inventory" },
  { icon: "👥", label: "Customers" },
  { icon: "⚙", label: "Settings" },
];

function formatIDR(n) { return "Rp " + n.toLocaleString("id-ID"); }

// nav
document.getElementById("nav").innerHTML = navItems.map(n =>
  `<button class="nav-item ${n.active ? "active" : ""}">${n.icon} ${n.label}</button>`
).join("");

// kpis
document.getElementById("kpi-strip").innerHTML = kpis.map(k => `
  <div class="kpi">
    <div class="kpi-label">${k.label}</div>
    <div class="kpi-value tabular">${k.value}</div>
    <div class="kpi-delta ${k.up ? "up" : "down"}">${k.up ? "↑" : "↓"} ${k.delta} <span>vs yesterday</span></div>
  </div>
`).join("");

// attention
const pending = orders.filter(o => o.status === "pending");
document.getElementById("attn-count").textContent = pending.length;
document.getElementById("attn-list").innerHTML = pending.length
  ? pending.map(o => `
      <div class="attn-row">
        <div>
          <div class="attn-name">${o.customer}</div>
          <div class="attn-meta tabular">${o.id} · ${o.items} items</div>
        </div>
        <div style="color:#D4A72C;">↗</div>
      </div>`).join("")
  : `<div style="font-size:12.5px; color:#8B90A3;">All caught up — nothing pending.</div>`;

// orders table
document.getElementById("orders-body").innerHTML = orders.map(o => {
  const s = statusStyle[o.status];
  return `
    <tr class="row-hover">
      <td class="tabular" style="color:#8B90A3;">${o.id}</td>
      <td style="font-weight:500;">${o.customer}</td>
      <td class="tabular">${o.items}</td>
      <td class="tabular" style="text-align:right; font-weight:500;">${formatIDR(o.total)}</td>
      <td><span class="status-pill" style="background:${s.bg}; color:${s.text};">${s.label}</span></td>
      <td style="color:#8B90A3; font-size:12.5px;">${o.time}</td>
      <td style="text-align:right; padding-right:22px; color:#8B90A3;">⋯</td>
    </tr>`;
}).join("");

// chart (simple SVG area chart, no dependencies)
function drawChart() {
  const svg = document.getElementById("chart");
  const w = 480, h = 200, padTop = 20, padBottom = 24, padX = 10;
  const max = Math.max(...revenueSeries.map(d => d.value)) * 1.15;
  const stepX = (w - padX * 2) / (revenueSeries.length - 1);
  const points = revenueSeries.map((d, i) => {
    const x = padX + i * stepX;
    const y = padTop + (1 - d.value / max) * (h - padTop - padBottom);
    return { x, y, d };
  });
  const linePath = points.map((p, i) => (i === 0 ? "M" : "L") + p.x + "," + p.y).join(" ");
  const areaPath = linePath + ` L${points[points.length-1].x},${h-padBottom} L${points[0].x},${h-padBottom} Z`;

  svg.innerHTML = `
    <defs>
      <linearGradient id="revGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#D4A72C" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#D4A72C" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${[0,1,2,3].map(i => `<line x1="${padX}" y1="${padTop + i*(h-padTop-padBottom)/3}" x2="${w-padX}" y2="${padTop + i*(h-padTop-padBottom)/3}" stroke="#232736" stroke-width="1"/>`).join("")}
    <path d="${areaPath}" fill="url(#revGrad)" stroke="none"/>
    <path d="${linePath}" fill="none" stroke="#D4A72C" stroke-width="2.5"/>
    ${points.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#D4A72C"/>`).join("")}
    ${points.map(p => `<text x="${p.x}" y="${h-4}" font-size="10" fill="#8B90A3" text-anchor="middle" font-family="IBM Plex Sans">${p.d.day}</text>`).join("")}
  `;
}
drawChart();

// range dropdown
const rangeBtn = document.getElementById("range-btn");
const rangeMenu = document.getElementById("range-menu");
rangeBtn.addEventListener("click", (e) => {
  rangeMenu.classList.toggle("open");
  e.stopPropagation();
});
rangeMenu.querySelectorAll("div").forEach(item => {
  item.addEventListener("click", (e) => {
    document.getElementById("range-label").textContent = item.dataset.range;
    rangeMenu.classList.remove("open");
    e.stopPropagation();
  });
});
document.addEventListener("click", () => rangeMenu.classList.remove("open"));

// register service worker for offline/installable behavior
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
